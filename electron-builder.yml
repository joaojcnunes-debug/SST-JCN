appId: com.jcnconsultoria.sst-jcn
productName: "SST JCN Consultoria"
copyright: "Copyright © 2025 JCN Consultoria"

directories:
  output: dist
  buildResources: electron/assets

icon: electron/assets/icon.png

# Arquivos empacotados no app.asar (código Electron compilado)
files:
  - electron-dist/**/*
  - package.json
  - "!node_modules/.cache/**"
  - "!**/*.map"
  - "!electron/**"
  - "!src/**"

# Recursos copiados para resources/ FORA do asar.
# O servidor Next.js (server.js) precisa estar fora do asar para ser executado
# via spawn + ELECTRON_RUN_AS_NODE=1 (Node puro sem patching de asar).
# Layout: resources/.next/standalone/ com static e public na posição que o server.js espera.
extraResources:
  - from: .next/standalone
    to: .next/standalone
  - from: .next/static
    to: .next/standalone/.next/static
  - from: public
    to: .next/standalone/public
  # Helper de captura de digital (EPI) — EpiFingerprint.exe + DPUruNet.dll.
  # Os DLLs nativos (dpfpdd/dpfj) vêm do RTE DigitalPersona instalado na máquina.
  - from: native/EpiFingerprint/build
    to: fingerprint
    filter:
      - "*.exe"
      - "*.dll"

win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "SST JCN Consultoria"

publish:
  provider: github
  owner: joaojcnunes-debug
  repo: SST-JCN
  releaseType: release
