name: Build & Release Desktop

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verificar se versão mudou
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version

          try {
            $prevContent = git show HEAD~1:package.json 2>$null
            $prevPkg = $prevContent | ConvertFrom-Json
            $prevVersion = $prevPkg.version
          } catch {
            $prevVersion = "0.0.0"
          }

          Write-Host "Versão atual: $version | Anterior: $prevVersion"

          if ($version -ne $prevVersion) {
            "changed=true" >> $env:GITHUB_OUTPUT
            "version=$version" >> $env:GITHUB_OUTPUT
            Write-Host "Versão mudou — iniciando build."
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Versão não mudou — pulando build."
          }

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Build Electron
        if: steps.version.outputs.changed == 'true'
        run: npm run electron:build

      - name: Publicar no Supabase Storage
        if: steps.version.outputs.changed == 'true'
        run: node scripts/publish-update.js
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
