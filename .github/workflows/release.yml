name: Build & Release Desktop

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verificar se versão mudou
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version

          try {
            $prevContent = git show HEAD~1:package.json 2>$null
            $prevPkg = $prevContent | ConvertFrom-Json
            $prevVersion = $prevPkg.version
          } catch {
            $prevVersion = "0.0.0"
          }

          Write-Host "Versão atual: $version | Anterior: $prevVersion"

          if ($version -ne $prevVersion) {
            "changed=true" >> $env:GITHUB_OUTPUT
            "version=$version" >> $env:GITHUB_OUTPUT
            Write-Host "Versão mudou — iniciando build."
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
            Write-Host "Versão não mudou — pulando build."
          }

      - name: Setup Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Build Electron (sem publicar)
        if: steps.version.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx next build && npm run electron:compile && npx electron-builder --win --publish never

      - name: Publicar no GitHub Releases
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = "dist/Painel SST Setup $version.exe"
          $blockmap  = "dist/Painel SST Setup $version.exe.blockmap"
          $yml       = "dist/latest.yml"

          Write-Host "Criando release v$version..."
          gh release create "v$version" `
            --title "Painel SST v$version" `
            --notes "Release automático v$version" `
            "$installer" "$blockmap" "$yml"
          Write-Host "Release v$version publicado com sucesso."

      - name: Publicar instalador no Supabase Storage
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = "dist/Painel SST Setup $version.exe"
          $uploadUrl = "$env:SUPABASE_URL/storage/v1/object/updates/PainelSST-Setup.exe"

          Write-Host "Enviando instalador ao Supabase Storage..."
          Invoke-RestMethod -Method Post `
            -Uri "$uploadUrl`?upsert=true" `
            -Headers @{
              "Authorization" = "Bearer $env:SUPABASE_SERVICE_KEY"
              "Content-Type"  = "application/octet-stream"
              "x-upsert"      = "true"
            } `
            -InFile $installer
          Write-Host "Upload concluido: PainelSST-Setup.exe"
