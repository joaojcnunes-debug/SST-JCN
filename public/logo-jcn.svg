<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 76" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Shield -->
  <path d="M 8,6 L 54,6 L 54,48 Q 54,64 31,74 Q 8,64 8,48 Z" fill="url(#shieldGrad)"/>

  <!-- Shield inner highlight -->
  <path d="M 12,10 L 50,10 L 50,48 Q 50,62 31,70 Q 12,62 12,48 Z"
    fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- Checkmark -->
  <path d="M 19,42 L 28,53 L 44,30"
    stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Divider -->
  <line x1="66" y1="10" x2="66" y2="68" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- SST -->
  <text x="80" y="44"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    fill="#1e3a8a">SST</text>

  <!-- JCN CONSULTORIA -->
  <text x="80" y="64"
    font-family="Arial, sans-serif"
    font-size="11"
    font-weight="700"
    fill="#3b82f6"
    letter-spacing="2.8">JCN CONSULTORIA</text>
</svg>
