<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 158" fill="none">
  <rect width="300" height="158" fill="#f8fafc" rx="6"/>

  <!-- === 1: Ambos braços abaixo dos ombros === cx=50 -->
  <circle cx="50" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="50" y1="35" x2="50" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="35" y1="47" x2="65" y2="47" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Arms down -->
  <line x1="35" y1="47" x2="25" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="65" y1="47" x2="75" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="38" y1="80" x2="62" y2="80" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="38" y1="80" x2="31" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="62" y1="80" x2="69" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="50" cy="138" r="10" fill="#2563eb"/>
  <text x="50" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">1</text>

  <!-- === 2: Um braço no nível ou acima dos ombros === cx=150 -->
  <circle cx="150" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="150" y1="35" x2="150" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="135" y1="47" x2="165" y2="47" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Left arm down, right arm UP -->
  <line x1="135" y1="47" x2="125" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="165" y1="47" x2="175" y2="18" stroke="#1e293b" stroke-width="2"/>
  <line x1="138" y1="80" x2="162" y2="80" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="138" y1="80" x2="131" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="162" y1="80" x2="169" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="150" cy="138" r="10" fill="#2563eb"/>
  <text x="150" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">2</text>

  <!-- === 3: Ambos braços no nível ou acima dos ombros === cx=250 -->
  <circle cx="250" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="250" y1="35" x2="250" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="235" y1="47" x2="265" y2="47" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Both arms UP -->
  <line x1="235" y1="47" x2="222" y2="18" stroke="#1e293b" stroke-width="2"/>
  <line x1="265" y1="47" x2="278" y2="18" stroke="#1e293b" stroke-width="2"/>
  <line x1="238" y1="80" x2="262" y2="80" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="238" y1="80" x2="231" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="262" y1="80" x2="269" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="250" cy="138" r="10" fill="#2563eb"/>
  <text x="250" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">3</text>
</svg>
