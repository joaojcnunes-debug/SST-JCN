<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 290" fill="none">
  <rect width="440" height="290" fill="#f8fafc" rx="6"/>

  <!-- ROW 1: figures 1-4 -->

  <!-- === 1: Sentado === cx=55 -->
  <circle cx="55" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="55" y1="35" x2="55" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="40" y1="46" x2="70" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="40" y1="46" x2="31" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="70" y1="46" x2="79" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Seat bar -->
  <line x1="30" y1="72" x2="80" y2="72" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <!-- Legs horizontal (seated) -->
  <line x1="42" y1="72" x2="42" y2="82" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="68" y1="72" x2="68" y2="82" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="42" y1="82" x2="28" y2="106" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="68" y1="82" x2="82" y2="106" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="55" cy="128" r="10" fill="#7c3aed"/>
  <text x="55" y="132" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">1</text>

  <!-- === 2: De pé ambas pernas esticadas === cx=165 -->
  <circle cx="165" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="165" y1="35" x2="165" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="150" y1="46" x2="180" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="150" y1="46" x2="141" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="180" y1="46" x2="189" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="152" y1="72" x2="178" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Both legs straight down -->
  <line x1="152" y1="72" x2="148" y2="110" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="178" y1="72" x2="182" y2="110" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="165" cy="128" r="10" fill="#7c3aed"/>
  <text x="165" y="132" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">2</text>

  <!-- === 3: De pé peso em uma perna === cx=275 -->
  <circle cx="275" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="275" y1="35" x2="272" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="260" y1="46" x2="290" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="260" y1="46" x2="251" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="290" y1="46" x2="299" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="260" y1="72" x2="284" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Weight leg straight, other slightly raised -->
  <line x1="260" y1="72" x2="255" y2="112" stroke="#1e293b" stroke-width="2"/>
  <line x1="284" y1="72" x2="293" y2="104" stroke="#1e293b" stroke-width="1.4"/>
  <circle cx="275" cy="128" r="10" fill="#7c3aed"/>
  <text x="275" y="132" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">3</text>

  <!-- === 4: De pé/agachado ambos joelhos flexionados === cx=385 -->
  <circle cx="385" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="385" y1="35" x2="385" y2="62" stroke="#1e293b" stroke-width="2"/>
  <line x1="370" y1="46" x2="400" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="370" y1="46" x2="361" y2="64" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="400" y1="46" x2="409" y2="64" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="374" y1="62" x2="396" y2="62" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Both knees bent -->
  <line x1="374" y1="62" x2="364" y2="85" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="396" y1="62" x2="406" y2="85" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="364" y1="85" x2="358" y2="110" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="406" y1="85" x2="412" y2="110" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="385" cy="128" r="10" fill="#7c3aed"/>
  <text x="385" y="132" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">4</text>

  <!-- DIVIDER -->
  <line x1="10" y1="150" x2="430" y2="150" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ROW 2: figures 5-7 centered -->

  <!-- === 5: De pé/agachado um joelho dobrado === cx=110 -->
  <circle cx="110" cy="168" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="110" y1="177" x2="110" y2="208" stroke="#1e293b" stroke-width="2"/>
  <line x1="95" y1="188" x2="125" y2="188" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="95" y1="188" x2="86" y2="206" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="125" y1="188" x2="134" y2="206" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="98" y1="208" x2="122" y2="208" stroke="#1e293b" stroke-width="1.6"/>
  <!-- One leg straight, one bent -->
  <line x1="98" y1="208" x2="92" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="122" y1="208" x2="132" y2="230" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="132" y1="230" x2="126" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="110" cy="270" r="10" fill="#7c3aed"/>
  <text x="110" y="274" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">5</text>

  <!-- === 6: Ajoelhado === cx=220 -->
  <circle cx="220" cy="168" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="220" y1="177" x2="220" y2="210" stroke="#1e293b" stroke-width="2"/>
  <line x1="205" y1="188" x2="235" y2="188" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="205" y1="188" x2="196" y2="208" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="235" y1="188" x2="244" y2="208" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="208" y1="210" x2="232" y2="210" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Kneeling: thighs vertical, feet behind -->
  <line x1="208" y1="210" x2="204" y2="238" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="232" y1="210" x2="236" y2="238" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Knee ground line -->
  <line x1="196" y1="238" x2="244" y2="238" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Feet (horizontal on ground) -->
  <line x1="204" y1="238" x2="196" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="236" y1="238" x2="244" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="220" cy="270" r="10" fill="#7c3aed"/>
  <text x="220" y="274" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">6</text>

  <!-- === 7: Andando === cx=330 -->
  <circle cx="330" cy="168" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="330" y1="177" x2="330" y2="210" stroke="#1e293b" stroke-width="2"/>
  <line x1="315" y1="188" x2="345" y2="188" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="315" y1="188" x2="305" y2="208" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="345" y1="188" x2="356" y2="208" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="318" y1="210" x2="342" y2="210" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Walking stride: legs in opposing angles -->
  <line x1="318" y1="210" x2="308" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="342" y1="210" x2="355" y2="240" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="355" y1="240" x2="360" y2="252" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Motion arrows -->
  <path d="M 340 175 L 348 170 L 344 178" fill="none" stroke="#94a3b8" stroke-width="1.3"/>
  <circle cx="330" cy="270" r="10" fill="#7c3aed"/>
  <text x="330" y="274" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">7</text>
</svg>
