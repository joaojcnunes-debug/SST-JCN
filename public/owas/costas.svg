<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 158" fill="none">
  <rect width="400" height="158" fill="#f8fafc" rx="6"/>

  <!-- === 1: Ereta === cx=50 -->
  <circle cx="50" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="50" y1="35" x2="50" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="35" y1="47" x2="65" y2="47" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="35" y1="47" x2="27" y2="70" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="65" y1="47" x2="73" y2="70" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="38" y1="80" x2="62" y2="80" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="38" y1="80" x2="31" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="62" y1="80" x2="69" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="50" cy="138" r="10" fill="#16a34a"/>
  <text x="50" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">1</text>

  <!-- === 2: Inclinada === cx=150 - spine angled forward -->
  <circle cx="140" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="140" y1="35" x2="158" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="128" y1="50" x2="157" y2="57" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="128" y1="50" x2="118" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="157" y1="57" x2="168" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="150" y1="80" x2="166" y2="80" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="150" y1="80" x2="143" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="166" y1="80" x2="172" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <circle cx="150" cy="138" r="10" fill="#16a34a"/>
  <text x="150" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">2</text>

  <!-- === 3: Ereta e Torcida === cx=250 - vertical spine, twisted shoulders/hips -->
  <circle cx="250" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="250" y1="35" x2="250" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="235" y1="46" x2="262" y2="50" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="235" y1="46" x2="225" y2="68" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="262" y1="50" x2="273" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="238" y1="80" x2="263" y2="77" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="238" y1="80" x2="231" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="263" y1="77" x2="270" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <path d="M 233 60 Q 250 53 267 60" stroke="#64748b" stroke-width="1.4" stroke-dasharray="3,2" stroke-linecap="round"/>
  <circle cx="250" cy="138" r="10" fill="#16a34a"/>
  <text x="250" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">3</text>

  <!-- === 4: Inclinada e Torcida === cx=350 - bent spine + twist -->
  <circle cx="340" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="340" y1="35" x2="357" y2="80" stroke="#1e293b" stroke-width="2"/>
  <line x1="328" y1="50" x2="357" y2="58" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="328" y1="50" x2="318" y2="70" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="357" y1="58" x2="368" y2="68" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="349" y1="80" x2="366" y2="77" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="349" y1="80" x2="340" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="366" y1="77" x2="374" y2="114" stroke="#1e293b" stroke-width="1.6"/>
  <path d="M 325 62 Q 342 55 360 62" stroke="#64748b" stroke-width="1.4" stroke-dasharray="3,2" stroke-linecap="round"/>
  <circle cx="350" cy="138" r="10" fill="#16a34a"/>
  <text x="350" y="142" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">4</text>
</svg>
