<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 158" fill="none">
  <rect width="300" height="158" fill="#f8fafc" rx="6"/>

  <!-- === 1: Carga ≤ 10 kg === cx=50, small box -->
  <circle cx="50" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="50" y1="35" x2="50" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="35" y1="46" x2="65" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="35" y1="46" x2="28" y2="66" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Arms holding small box -->
  <line x1="65" y1="46" x2="72" y2="62" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="38" y1="72" x2="62" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="38" y1="72" x2="31" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="62" y1="72" x2="69" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Small box (10px) -->
  <rect x="66" y="60" width="18" height="14" rx="2" stroke="#1e293b" stroke-width="1.6" fill="#dbeafe"/>
  <text x="75" y="71" text-anchor="middle" font-size="7" fill="#1e40af" font-family="system-ui" font-weight="600">10</text>
  <text x="75" y="80" text-anchor="middle" font-size="7" fill="#64748b" font-family="system-ui">kg</text>
  <circle cx="50" cy="130" r="10" fill="#dc2626"/>
  <text x="50" y="134" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">1</text>

  <!-- === 2: Carga > 10 kg e ≤ 20 kg === cx=150, medium box -->
  <circle cx="150" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="150" y1="35" x2="150" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="135" y1="46" x2="165" y2="46" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="135" y1="46" x2="127" y2="65" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="165" y1="46" x2="173" y2="60" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="138" y1="72" x2="162" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="138" y1="72" x2="131" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="162" y1="72" x2="169" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Medium box (20px) -->
  <rect x="165" y="56" width="24" height="20" rx="2" stroke="#1e293b" stroke-width="1.6" fill="#fef9c3"/>
  <text x="177" y="68" text-anchor="middle" font-size="7" fill="#854d0e" font-family="system-ui" font-weight="600">20</text>
  <text x="177" y="77" text-anchor="middle" font-size="7" fill="#64748b" font-family="system-ui">kg</text>
  <circle cx="150" cy="130" r="10" fill="#dc2626"/>
  <text x="150" y="134" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">2</text>

  <!-- === 3: Carga > 20 kg === cx=250, large box, figure slightly bent -->
  <circle cx="246" cy="26" r="9" stroke="#1e293b" stroke-width="1.8"/>
  <line x1="246" y1="35" x2="252" y2="72" stroke="#1e293b" stroke-width="2"/>
  <line x1="233" y1="46" x2="260" y2="52" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="233" y1="46" x2="224" y2="64" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="260" y1="52" x2="268" y2="60" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="244" y1="72" x2="262" y2="72" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="244" y1="72" x2="237" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <line x1="262" y1="72" x2="268" y2="108" stroke="#1e293b" stroke-width="1.6"/>
  <!-- Large box (28px) -->
  <rect x="261" y="52" width="30" height="26" rx="2" stroke="#1e293b" stroke-width="1.6" fill="#fee2e2"/>
  <text x="276" y="66" text-anchor="middle" font-size="7" fill="#991b1b" font-family="system-ui" font-weight="600">&gt;20</text>
  <text x="276" y="76" text-anchor="middle" font-size="7" fill="#64748b" font-family="system-ui">kg</text>
  <circle cx="250" cy="130" r="10" fill="#dc2626"/>
  <text x="250" y="134" text-anchor="middle" font-size="11" fill="white" font-family="system-ui,sans-serif" font-weight="700">3</text>
</svg>
